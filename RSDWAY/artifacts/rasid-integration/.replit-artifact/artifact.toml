kind = "web"
previewPath = "/"
title = "Rasid Integration Portal"
version = "1.0.0"
id = "artifacts/rasid-integration"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24543

[services.development]
run = "pnpm --filter @workspace/rasid-integration run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rasid-integration", "run", "build" ]
publicDir = "artifacts/rasid-integration/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24543"
BASE_PATH = "/"
